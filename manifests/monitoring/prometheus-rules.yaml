# =============================================================================
# Prometheus Recording Rules — Kubeflow/Cilium GPU Scheduling Demo
#
# Since we use fake GPUs (no DCGM exporter), these rules derive GPU
# utilisation signals from pod scheduling and connectivity state. They
# accurately represent what you would see with real DCGM metrics:
#
#   gpu_demo_utilization_pct  ~40% when workers can't reach coordinator
#                             ~85% when all pods co-located in zone-a
#   gpu_demo_idle_pct         inverse of utilisation
#   gpu_demo_pending_workers  GPU workers stuck waiting
#   gpu_demo_zones_occupied   distinct topology zones holding ml-demo pods
#                             (> 1 = cross-zone placement; works without
#                             relying on Cilium-specific pod zone labels,
#                             making it useful even in clusters without
#                             hard zone-based network policies)
# =============================================================================

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gpu-scheduling-demo-rules
  namespace: monitoring
  labels:
    release: monitoring  # Matches kube-prometheus-stack label selector
spec:
  groups:
    # -----------------------------------------------------------------------
    # Group 0: Cross-zone placement detection
    #
    # Uses node topology labels — not pod labels — so it detects the
    # scheduling mismatch regardless of whether a hard Cilium zone policy is
    # in place. In production clusters without zone-based CiliumNetworkPolicy,
    # gpu_demo_zones_occupied > 1 is the first signal that cross-zone
    # placement is causing NCCL AllReduce latency degradation or egress cost.
    # -----------------------------------------------------------------------
    - name: cross_zone_placement
      interval: 15s
      rules:
        # Count of distinct topology zones occupied by scheduled ml-demo pods.
        #
        # Conflict state (before fix):  2
        #   — coordinator on zone-b node, workers on zone-a nodes
        # Resolved state (after fix):   1
        #   — all pods co-located on zone-a nodes
        # No pods scheduled yet:        0  (via `or vector(0)`)
        #
        # Join strategy:
        #   kube_pod_info{node!=""} gives scheduled pods with their node name.
        #   kube_node_labels enriches each pod with its node's zone label.
        #   group by zone collapses all pods per zone to one series.
        #   count() returns the number of distinct zones.
        - record: gpu_demo_zones_occupied
          expr: |
            count(
              count by (label_topology_kubernetes_io_zone) (
                kube_pod_info{namespace="ml-demo", node!=""}
                * on(node) group_left(label_topology_kubernetes_io_zone)
                kube_node_labels{label_topology_kubernetes_io_zone!=""}
              )
            ) or vector(0)

    # -----------------------------------------------------------------------
    # Group 1: GPU Utilisation (derived from pod connectivity state)
    # -----------------------------------------------------------------------
    - name: gpu_utilization
      interval: 15s
      rules:
        # Workers successfully connected = GPU actively computing (high util)
        # Workers stuck (can't reach coordinator) = GPU idle (low util)
        - record: gpu_demo_workers_connected
          expr: |
            count(
              kube_pod_status_phase{namespace="ml-demo", phase="Succeeded"}
              * on(pod) group_left()
              kube_pod_labels{namespace="ml-demo", label_role="gpu-worker"}
            ) or vector(0)

        - record: gpu_demo_workers_failed
          expr: |
            count(
              kube_pod_status_phase{namespace="ml-demo", phase="Failed"}
              * on(pod) group_left()
              kube_pod_labels{namespace="ml-demo", label_role="gpu-worker"}
            ) or vector(0)

        - record: gpu_demo_workers_running
          expr: |
            count(
              kube_pod_status_phase{namespace="ml-demo", phase="Running"}
              * on(pod) group_left()
              kube_pod_labels{namespace="ml-demo", label_role="gpu-worker"}
            ) or vector(0)

        # Simulated GPU utilisation:
        # - Workers connected (Succeeded): 85% (topology-aware, all in zone-a)
        # - Workers running but stuck (before fix): 40% (allocated but idle)
        # - No pods: 0%
        - record: gpu_demo_utilization_pct
          expr: |
            (
              (gpu_demo_workers_connected / 4) * 85
            ) or (
              clamp_min(
                (gpu_demo_workers_running / 4) * 40,
                0
              )
            ) or vector(0)

        - record: gpu_demo_idle_pct
          expr: 100 - gpu_demo_utilization_pct

    # -----------------------------------------------------------------------
    # Group 2: Scheduling Conflict Indicators
    # -----------------------------------------------------------------------
    - name: scheduling_conflict_indicators
      interval: 15s
      rules:
        # Coordinator in zone-b (detected via pod label set in workload template).
        # 1 = coordinator is cross-zone from workers (conflict active)
        # 0 = coordinator is in zone-a (resolved)
        - record: gpu_demo_coordinator_zone
          expr: |
            count(
              kube_pod_info{namespace="ml-demo"}
              * on(pod) group_left()
              kube_pod_labels{namespace="ml-demo", label_role="coordinator", label_zone="zone-b"}
            ) or vector(0)

        # Pending GPU pods: scheduler cannot place them
        - record: gpu_demo_pending_workers
          expr: |
            count(
              kube_pod_status_phase{namespace="ml-demo", phase="Pending"}
              * on(pod) group_left()
              kube_pod_labels{namespace="ml-demo", label_role="gpu-worker"}
            ) or vector(0)

        # GPU allocation count (requires real DCGM; placeholder for demo)
        - record: gpu_demo_allocated_count
          expr: |
            kube_pod_container_resource_requests{
              namespace="ml-demo",
              resource="nvidia_com_gpu",
              container="gpu-worker"
            } * on(pod) group_left()
            kube_pod_status_phase{namespace="ml-demo", phase="Running"}
            or vector(0)

        # Composite conflict score: 1.0 = full conflict, 0.0 = resolved
        - record: gpu_demo_conflict_score
          expr: |
            clamp_max(
              (gpu_demo_pending_workers / 4) + (gpu_demo_coordinator_zone * 0.5),
              1.0
            )

    # -----------------------------------------------------------------------
    # Group 3: Scheduler Health
    # -----------------------------------------------------------------------
    - name: scheduler_health
      interval: 30s
      rules:
        - record: gpu_demo_unschedulable_pods
          expr: |
            count(
              kube_pod_status_unschedulable{namespace="ml-demo"} == 1
            ) or vector(0)

        # How long have pods been stuck in Pending (scheduling gridlock signal)
        - record: gpu_demo_max_pending_duration_seconds
          expr: |
            max(
              time() - kube_pod_created{namespace="ml-demo"}
              * on(pod) group_left()
              kube_pod_status_phase{namespace="ml-demo", phase="Pending"}
            ) or vector(0)

    # -----------------------------------------------------------------------
    # Group 4: Alerting rules
    # -----------------------------------------------------------------------
    - name: gpu_scheduling_alerts
      rules:
        - alert: GPUUtilizationCriticallyLow
          expr: gpu_demo_utilization_pct < 50
          for: 1m
          labels:
            severity: warning
            component: gpu-scheduler
          annotations:
            summary: "GPU utilisation is {{ $value | humanize }}%"
            description: |
              GPU utilisation has been below 50% for over 1 minute.
              Check gpu_demo_zones_occupied — if > 1, coordinator and workers
              are in different topology zones, causing connectivity failure or
              NCCL AllReduce latency degradation.
              Fix: Apply pod topology spread constraints to co-locate all
              ml-training pods in the same availability zone.

        - alert: GPUWorkersCantReachCoordinator
          expr: gpu_demo_coordinator_zone > 0 and gpu_demo_workers_running > 0
          for: 30s
          labels:
            severity: critical
            component: gpu-scheduler
          annotations:
            summary: "Coordinator in zone-b while GPU workers are in zone-a"
            description: |
              Cross-zone scheduling detected: coordinator pod landed in zone-b,
              GPU workers are in zone-a. A zone-based Cilium network policy is
              blocking worker-to-coordinator traffic. GPUs are ALLOCATED but IDLE.
              Fix: Apply nodeAffinity and topologySpreadConstraints to the
              coordinator Deployment to pin it to the same zone as GPU workers.
