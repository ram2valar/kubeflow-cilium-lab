apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-scheduling-demo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # kube-prometheus-stack auto-imports ConfigMaps with this label
data:
  gpu-scheduling-demo.json: |
    {
      "title": "GPU Scheduling Demo — Kubeflow + Cilium",
      "uid": "gpu-scheduling-demo",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-10m", "to": "now" },
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "tags": ["kubecon", "gpu", "kubeflow", "cilium"],
      "panels": [
        {
          "id": 1,
          "title": "GPU Utilization %",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 60, "color": "yellow" },
                  { "value": 75, "color": "green" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_utilization_pct",
              "legendFormat": "GPU Utilization",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "GPU Idle %",
          "type": "gauge",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 8 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 25, "color": "yellow" },
                  { "value": 50, "color": "red" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_idle_pct",
              "legendFormat": "GPU Idle",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Scheduling Conflict Score",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "value_and_name",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.1, "color": "red" }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "range", "options": { "from": 0, "to": 0.1, "result": { "text": "OK — No Conflict" } } },
                { "type": "range", "options": { "from": 0.1, "to": 1, "result": { "text": "CONFLICT ACTIVE" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_conflict_score",
              "legendFormat": "Conflict",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Coordinator in Wrong Zone (zone-b)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "textMode": "value_and_name",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "red" }
                ]
              },
              "color": { "mode": "thresholds" },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "✓ zone-a (correct)" } } },
                { "type": "value", "options": { "1": { "text": "✗ zone-b (wrong!)" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_coordinator_zone",
              "legendFormat": "Coordinator Zone",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "GPU Utilization Over Time",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 60, "color": "yellow" },
                  { "value": 75, "color": "green" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_utilization_pct",
              "legendFormat": "GPU Utilization %",
              "refId": "A"
            },
            {
              "expr": "gpu_demo_idle_pct",
              "legendFormat": "GPU Idle %",
              "refId": "B"
            }
          ],
          "annotations": [
            {
              "name": "Fix applied",
              "datasource": "Prometheus",
              "expr": "changes(gpu_demo_coordinator_zone[1m]) > 0",
              "titleFormat": "Fix Applied",
              "textFormat": "Topology constraints applied — coordinator moved to zone-a"
            }
          ]
        },
        {
          "id": 6,
          "title": "Pod Status — ml-demo namespace",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          },
          "targets": [
            {
              "expr": "count by(phase) (kube_pod_status_phase{namespace=\"ml-demo\"})",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Pending + Failed GPU Workers",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "red" }
                ]
              },
              "color": { "mode": "thresholds" }
            }
          },
          "targets": [
            {
              "expr": "gpu_demo_pending_workers",
              "legendFormat": "Pending GPU Workers",
              "refId": "A"
            },
            {
              "expr": "gpu_demo_workers_failed",
              "legendFormat": "Failed GPU Workers",
              "refId": "B"
            }
          ]
        }
      ]
    }
